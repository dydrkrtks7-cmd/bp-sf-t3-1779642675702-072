<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#dc2626"/>
      <stop offset="100%" stop-color="#b91c1c"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#b91c1c"/>
    </linearGradient>
  </defs>

  <!-- 배경 -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Geometric pattern -->
  <circle cx="703" cy="36" r="75" fill="#b91c1c" opacity="0.19"/>
    <circle cx="1043" cy="158" r="74" fill="#b91c1c" opacity="0.18"/>
    <circle cx="681" cy="467" r="77" fill="#b91c1c" opacity="0.19"/>
    <circle cx="1278" cy="90" r="71" fill="#b91c1c" opacity="0.06"/>
    <circle cx="151" cy="480" r="21" fill="#b91c1c" opacity="0.12"/>
    <circle cx="1163" cy="429" r="95" fill="#b91c1c" opacity="0.16"/>
    <rect x="803" y="373" width="43" height="60" rx="8" fill="#dc2626" opacity="0.05" transform="rotate(26, -46, 359)"/>
    <rect x="846" y="275" width="21" height="40" rx="8" fill="#dc2626" opacity="0.05" transform="rotate(5, 550, 440)"/>
    <rect x="473" y="465" width="55" height="93" rx="8" fill="#dc2626" opacity="0.12" transform="rotate(22, 1050, 411)"/>
    <rect x="1003" y="436" width="93" height="33" rx="8" fill="#dc2626" opacity="0.07" transform="rotate(23, 1249, -15)"/>
    <rect x="49" y="85" width="47" height="68" rx="8" fill="#dc2626" opacity="0.05" transform="rotate(19, 816, -25)"/>
    <rect x="1293" y="107" width="79" height="77" rx="8" fill="#dc2626" opacity="0.14" transform="rotate(25, 1024, 507)"/>
    <rect x="1214" y="673" width="39" height="62" rx="8" fill="#dc2626" opacity="0.04" transform="rotate(37, 929, 163)"/>
    <rect x="679" y="392" width="68" height="82" rx="8" fill="#dc2626" opacity="0.15" transform="rotate(16, 262, 138)"/>
    <polygon points="203,334 266,460 140,460" fill="#b91c1c" opacity="0.06"/>
    <polygon points="12,437 79,571 -55,571" fill="#b91c1c" opacity="0.04"/>
    <polygon points="-18,2 47,132 -83,132" fill="#b91c1c" opacity="0.06"/>
    <polygon points="346,-49 393,45 299,45" fill="#b91c1c" opacity="0.06"/>

  <!-- Wave at bottom -->
  <path d="M0,586 C360,608 840,564 1200,586 L1200,630 L0,630Z" fill="#b91c1c" opacity="0.3"/>

  <!-- 중앙 텍스트 카드 -->
  <rect x="80" y="195" width="1040" height="260" rx="20" fill="rgba(0,0,0,0.35)" filter="url(#blur-bg)"/>
  <filter id="blur-bg"><feGaussianBlur stdDeviation="8"/></filter>

  <text x="600" y="270" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="44" font-weight="700" fill="#ffffff" letter-spacing="2">
    강남 셔츠룸
  </text>
  <text x="600" y="330" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="22" font-weight="400" fill="rgba(255,255,255,0.85)">
    마포 — 성우이벤트
  </text>

  <!-- Accent line -->
  <line x1="450" y1="355" x2="750" y2="355" stroke="#fbbf24" stroke-width="3" stroke-linecap="round" opacity="0.8"/>

  <!-- 하단 CTA -->
  <rect x="440" y="385" width="320" height="40" rx="20" fill="#fbbf24" opacity="0.9"/>
  <text x="600" y="411" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="16" font-weight="600" fill="#ffffff">
    ▼ 자세히 보기
  </text>

  <!-- 상단 브랜드 -->
  <text x="60" y="55" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="18" font-weight="600" fill="rgba(255,255,255,0.6)">
    마포 강남 셔츠룸 — 성우이벤트
  </text>
</svg>